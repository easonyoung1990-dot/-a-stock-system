# 自动部署到 GitHub Pages
# 触发：推送到 main 分支，或在 Actions 页手动点 "Run workflow"
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# 给本工作流授予部署 Pages 所需的权限
permissions:
  contents: read
  pages: write
  id-token: write

# 同一时间只跑一个部署，新部署取消进行中的旧部署
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: 安装依赖
        run: npm ci

      - name: 生产构建
        run: npm run build

      - name: 配置 Pages（首次会自动开启 Pages）
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: 上传构建产物
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
